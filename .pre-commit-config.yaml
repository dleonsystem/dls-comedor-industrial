# .pre-commit-config.yaml
# Hooks de pre-commit para dls-comedor-industrial
# Instalación: make setup  (o: pip install pre-commit && pre-commit install)
# Ejecución manual: pre-commit run --all-files

default_language_version:
  python: python3.11

repos:
  # ── Hooks básicos de pre-commit ──────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, develop]

  # ── Ruff — Linter + Formatter ────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── mypy — Tipado estático ────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-psycopg2
          - pydantic>=2.5
        args: [--config-file=pyproject.toml]
        exclude: ^(services/odoo/|infra/gcp/)

  # ── Bandit — Seguridad Python ─────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        exclude: ^tests/

  # ── detect-secrets — Evitar credenciales en el repo ───────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(\.env\.example|CHANGELOG\.md)

  # ── Conventional Commits — Formato de mensajes ────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, test, chore, perf, ci, revert]

  # ── Validar docker-compose ────────────────────────────────────────
  - repo: https://github.com/IamTheFij/docker-pre-commit
    rev: v3.0.1
    hooks:
      - id: docker-compose-check

  # ── EditorConfig ─────────────────────────────────────────────────
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.0.3
    hooks:
      - id: editorconfig-checker
        exclude: ^(CHANGELOG\.md|LICENSE)
