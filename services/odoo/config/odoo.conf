[options]
; Configuración de Odoo para entorno de desarrollo
; Los valores de producción se sobreescriben vía variables de entorno

addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Base de datos — los valores reales vienen de variables de entorno
db_host = db
db_port = 5432
db_user = comedor_user
db_password = False
db_name = False
db_sslmode = prefer

; Workers (0 = modo thread, recomendado para desarrollo)
workers = 0
; Límites de memoria por worker (en bytes)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Logging
log_level = info
logfile = False

; Interfaz web
http_interface =
http_port = 8069
longpolling_port = 8072

; Contraseña maestra de administración (sobreescribir en producción)
admin_passwd = CHANGE_ME_IN_PRODUCTION

; Sin demostración de datos en producción
without_demo = True

; Email (configurar vía variables de entorno o Settings > Technical > Outgoing Mail)
; smtp_server = smtp.example.com
; smtp_port = 587
; smtp_ssl = True
; smtp_user = no-reply@example.com
; smtp_password = CHANGE_ME
